name: nitido
description: Nítido - Suas finanças em foco
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Backend
  supabase_flutter: ^2.5.0

  # Charts
  fl_chart: ^0.68.0

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.6
  flutter_slidable: ^3.1.0
  percent_indicator: ^4.2.3
  flutter_dotenv: ^5.0.0
  local_auth: ^2.1.0

  # Export
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true
  assets:
    - .env
